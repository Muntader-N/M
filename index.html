<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كتاباتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      --white: #f0efff;
      --dim: rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: #000;
      color: var(--white);
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════
       GALAXY BACKGROUND CANVAS
    ═══════════════════════════════════════ */
    #galaxy-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ═══════════════════════════════════════
       GLASS OVERLAY ON ENTIRE PAGE
    ═══════════════════════════════════════ */
    #page-glass {
      position: fixed;
      inset: 0;
      z-index: 1;
      backdrop-filter: blur(2px) brightness(0.92);
      -webkit-backdrop-filter: blur(2px) brightness(0.92);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════ */
    #app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 120px;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    header {
      width: 100%;
      text-align: center;
      margin-bottom: 50px;
      padding: 30px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      box-shadow: var(--glass-shadow);
    }

    header h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 30px rgba(160,140,255,0.6), 0 0 60px rgba(100,80,200,0.3);
    }

    header p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--dim);
      font-weight: 300;
      letter-spacing: 1px;
    }

    /* ═══════════════════════════════════════
       WRITINGS LIST
    ═══════════════════════════════════════ */
    #writings-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .writing-card {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 28px 32px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      animation: cardIn 0.6s ease both;
      cursor: default;
    }

    .writing-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1), 0 0 30px rgba(130,100,255,0.15);
    }

    .writing-card p {
      font-family: 'Amiri', serif;
      font-size: 1.15rem;
      line-height: 2.1;
      color: rgba(255,255,255,0.88);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .writing-card .card-num {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      margin-bottom: 10px;
      letter-spacing: 2px;
      font-family: 'Tajawal', sans-serif;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stagger */
    .writing-card:nth-child(1)  { animation-delay: 0.05s; }
    .writing-card:nth-child(2)  { animation-delay: 0.12s; }
    .writing-card:nth-child(3)  { animation-delay: 0.19s; }
    .writing-card:nth-child(4)  { animation-delay: 0.26s; }
    .writing-card:nth-child(5)  { animation-delay: 0.33s; }
    .writing-card:nth-child(6)  { animation-delay: 0.40s; }
    .writing-card:nth-child(7)  { animation-delay: 0.47s; }
    .writing-card:nth-child(8)  { animation-delay: 0.54s; }

    /* empty state */
    #empty-state {
      text-align: center;
      color: var(--dim);
      font-size: 1rem;
      padding: 60px 20px;
      display: none;
    }
    #empty-state.show { display: block; }

    /* ═══════════════════════════════════════
       BOTTOM BAR  (stats + message button)
    ═══════════════════════════════════════ */
    #bottom-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
      background: rgba(10,8,20,0.55);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 12px 20px;
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 10px 20px;
      min-width: 80px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .stat-box .val {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .stat-box .lbl {
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 1px;
    }

    #msg-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 18px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.9rem;
      padding: 12px 22px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      white-space: nowrap;
    }

    #msg-btn:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.04);
      box-shadow: 0 0 20px rgba(160,130,255,0.3);
    }

    /* ═══════════════════════════════════════
       MESSAGE MODAL OVERLAY
    ═══════════════════════════════════════ */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(14px) brightness(0.6);
      -webkit-backdrop-filter: blur(14px) brightness(0.6);
      background: rgba(0,0,0,0.4);
    }

    #modal-overlay.open { display: flex; }

    #modal-box {
      background: rgba(15,12,30,0.72);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 36px 32px;
      width: min(90vw, 460px);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      box-shadow: 0 24px 64px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.12);
      animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { opacity:0; transform: scale(0.85) translateY(20px); }
      to   { opacity:1; transform: scale(1)    translateY(0); }
    }

    #modal-box h2 {
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 22px;
      color: #fff;
      text-shadow: 0 0 20px rgba(160,140,255,0.4);
    }

    #msg-input {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      padding: 16px;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 0.25s, box-shadow 0.25s;
      direction: rtl;
    }

    #msg-input::placeholder { color: rgba(255,255,255,0.3); }

    #msg-input:focus {
      border-color: rgba(200,180,255,0.45);
      box-shadow: 0 0 0 3px rgba(160,130,255,0.15);
    }

    #modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .modal-btn {
      flex: 1;
      padding: 13px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    #send-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    #send-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 18px rgba(160,130,255,0.25);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #cancel-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
    }

    #cancel-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }

    #send-status {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 18px;
      transition: opacity 0.3s;
    }

    #send-status.ok  { color: #8effa0; }
    #send-status.err { color: #ffaeae; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
  </style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>
<div id="page-glass"></div>

<div id="app">
  <header>
    <h1>✦ كتاباتي ✦</h1>
    <p>أفكار، خواطر، كلمات</p>
  </header>

  <div id="writings-list"></div>
  <div id="empty-state">
    <p>لم أضف كتابات بعد 🌙</p>
    <p style="font-size:0.8rem;margin-top:8px;color:rgba(255,255,255,0.3);">أضف ملف mytxt.txt في نفس المجلد</p>
  </div>
</div>

<!-- Bottom Stats Bar -->
<div id="bottom-bar">
  <div class="stat-box">
    <span class="val" id="count-writings">0</span>
    <span class="lbl">كتابة</span>
  </div>

  <button id="msg-btn">✉ راسلني</button>

  <div class="stat-box">
    <span class="val" id="count-visitors">—</span>
    <span class="lbl">زائر</span>
  </div>
</div>

<!-- Message Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>أرسل لي رسالة 🌙</h2>
    <textarea id="msg-input" placeholder="اكتب ما تريد قوله..."></textarea>
    <div id="modal-actions">
      <button class="modal-btn" id="cancel-btn">إلغاء</button>
      <button class="modal-btn" id="send-btn">إرسال ✦</button>
    </div>
    <div id="send-status"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   GALAXY CANVAS
════════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  const stars = [], meteors = [], nebulas = [], moons = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  function initObjects() {
    stars.length = 0; meteors.length = 0; nebulas.length = 0; moons.length = 0;

    // Stars
    for (let i = 0; i < 320; i++) {
      stars.push({
        x: rand(0, W), y: rand(0, H),
        r: rand(0.3, 2.2),
        alpha: rand(0.3, 1),
        twinkleSpeed: rand(0.008, 0.025),
        twinkleOffset: rand(0, Math.PI * 2),
        color: Math.random() < 0.15
          ? `hsl(${rand(220,280)},80%,85%)`
          : Math.random() < 0.1
            ? `hsl(${rand(30,60)},90%,85%)`
            : '#ffffff'
      });
    }

    // Nebula blobs
    for (let i = 0; i < 5; i++) {
      nebulas.push({
        x: rand(0, W), y: rand(0, H),
        rx: rand(W * 0.15, W * 0.35),
        ry: rand(H * 0.12, H * 0.3),
        hue: [240,260,280,300,200][i],
        alpha: rand(0.04, 0.11)
      });
    }

    // Moons
    for (let i = 0; i < 2; i++) {
      moons.push({
        x: rand(W * 0.1, W * 0.9),
        y: rand(H * 0.05, H * 0.4),
        r: rand(18, 36),
        phase: rand(0, 1)
      });
    }

    // Meteors
    for (let i = 0; i < 4; i++) {
      spawnMeteor();
    }
  }

  function spawnMeteor() {
    meteors.push({
      x: rand(0, W),
      y: rand(-H * 0.3, H * 0.3),
      len: rand(80, 200),
      speed: rand(6, 14),
      alpha: rand(0.5, 1),
      active: true,
      trail: 0
    });
  }

  function drawNebulas() {
    nebulas.forEach(n => {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
      g.addColorStop(0, `hsla(${n.hue},70%,40%,${n.alpha})`);
      g.addColorStop(0.5, `hsla(${n.hue + 20},60%,30%,${n.alpha * 0.5})`);
      g.addColorStop(1, 'transparent');
      ctx.save();
      ctx.scale(n.rx / Math.max(n.rx, n.ry), n.ry / Math.max(n.rx, n.ry));
      const scaleX = Math.max(n.rx, n.ry) / n.rx;
      const scaleY = Math.max(n.rx, n.ry) / n.ry;
      ctx.restore();

      ctx.save();
      ctx.translate(n.x, n.y);
      ctx.scale(n.rx / 100, n.ry / 100);
      const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, 100);
      g2.addColorStop(0, `hsla(${n.hue},65%,38%,${n.alpha})`);
      g2.addColorStop(0.6, `hsla(${n.hue + 30},55%,25%,${n.alpha * 0.4})`);
      g2.addColorStop(1, 'transparent');
      ctx.fillStyle = g2;
      ctx.beginPath();
      ctx.arc(0, 0, 100, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawMoon(m) {
    ctx.save();
    // Glow
    const glow = ctx.createRadialGradient(m.x, m.y, m.r * 0.5, m.x, m.y, m.r * 3);
    glow.addColorStop(0, 'rgba(220,210,255,0.18)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Moon body
    ctx.fillStyle = '#dcd8f0';
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fill();

    // Crescent shadow
    ctx.fillStyle = 'rgba(0,0,20,0.85)';
    ctx.beginPath();
    ctx.arc(m.x + m.r * 0.3, m.y, m.r * 0.85, 0, Math.PI * 2);
    ctx.fill();

    // Craters
    [[0.35, -0.3, 0.12], [-0.2, 0.4, 0.08], [0.1, 0.2, 0.06]].forEach(([dx, dy, cr]) => {
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.arc(m.x + dx * m.r, m.y + dy * m.r, cr * m.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.restore();
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;

    // Deep space bg
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
    bg.addColorStop(0, '#0d0820');
    bg.addColorStop(0.5, '#060412');
    bg.addColorStop(1, '#000005');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    drawNebulas();

    // Stars
    stars.forEach(s => {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset));
      ctx.save();
      ctx.globalAlpha = a;
      // glow for bigger stars
      if (s.r > 1.2) {
        const sg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        sg.addColorStop(0, s.color);
        sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Moons
    moons.forEach(drawMoon);

    // Meteors
    meteors.forEach((m, i) => {
      if (!m.active) return;
      m.trail += m.speed;
      const angle = Math.PI / 5;
      const ex = m.x + Math.cos(angle) * m.trail;
      const ey = m.y + Math.sin(angle) * m.trail;

      const grad = ctx.createLinearGradient(m.x, m.y, ex, ey);
      grad.addColorStop(0, `rgba(255,255,255,0)`);
      grad.addColorStop(0.6, `rgba(200,190,255,${m.alpha * 0.6})`);
      grad.addColorStop(1, `rgba(255,255,255,${m.alpha})`);

      ctx.save();
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.restore();

      if (ex > W + 100 || ey > H + 100) {
        meteors[i] = {
          x: rand(-W * 0.2, W * 0.8),
          y: rand(-H * 0.4, 0),
          len: rand(80, 200),
          speed: rand(6, 14),
          alpha: rand(0.5, 1),
          active: true,
          trail: 0
        };
      }
    });

    requestAnimationFrame(draw);
  }

  resize();
  initObjects();
  draw();
  window.addEventListener('resize', () => { resize(); initObjects(); });
})();

/* ════════════════════════════════════════════════
   WRITINGS LOADER
   Reads mytxt.txt — each non-empty line = one card
════════════════════════════════════════════════ */
const DEMO_WRITINGS = [
  "أضف ملف mytxt.txt في نفس مجلد الموقع، وضع كل كتابة في سطر جديد.",
  "هذا نص تجريبي — الليل أكثر صدقًا من النهار.\nوالصمت أحيانًا يقول ما تعجز عنه الكلمات.",
  "بعض الأشياء لا تُكتب لتُقرأ، بل لتُحسَّ."
];

async function loadWritings() {
  let lines = [];
  try {
    const res = await fetch('mytxt.txt?v=' + Date.now());
    if (res.ok) {
      const text = await res.text();
      lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    }
  } catch(e) { /* file not found — use demo */ }

  if (!lines.length) lines = DEMO_WRITINGS;

  const list = document.getElementById('writings-list');
  const empty = document.getElementById('empty-state');
  list.innerHTML = '';

  if (!lines.length) {
    empty.classList.add('show');
    document.getElementById('count-writings').textContent = '0';
    return;
  }

  lines.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'writing-card';
    card.innerHTML = `<div class="card-num">✦ ${String(i + 1).padStart(2, '0')}</div><p>${text.replace(/\n/g, '<br>')}</p>`;
    list.appendChild(card);
  });

  document.getElementById('count-writings').textContent = lines.length;
}

loadWritings();

/* ════════════════════════════════════════════════
   VISITOR COUNTER  (localStorage simple counter)
════════════════════════════════════════════════ */
(function() {
  const key = 'site_visits';
  let visits = parseInt(localStorage.getItem(key) || '0', 10);
  visits++;
  localStorage.setItem(key, visits);
  document.getElementById('count-visitors').textContent = visits;
})();

/* ════════════════════════════════════════════════
   MESSAGE MODAL + TELEGRAM BOT
════════════════════════════════════════════════ */
const BOT_TOKEN = '8091722508:AAHvpZW0YcZGozWG39OMUQ3KBSClDPOcf_Y';
const CHAT_ID   = '8224700684';

const overlay   = document.getElementById('modal-overlay');
const msgBtn    = document.getElementById('msg-btn');
const cancelBtn = document.getElementById('cancel-btn');
const sendBtn   = document.getElementById('send-btn');
const msgInput  = document.getElementById('msg-input');
const status    = document.getElementById('send-status');

msgBtn.addEventListener('click', () => {
  overlay.classList.add('open');
  msgInput.focus();

cancelBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

function closeModal() {
  overlay.classList.remove('open');
  msgInput.value = '';
  status.textContent = '';
  status.className = '';
}

sendBtn.addEventListener('click', async () => {
  const text = msgInput.value.trim();
  if (!text) return;

  sendBtn.disabled = true;
  status.textContent = '⏳ جاري الإرسال...';
  status.className = '';

  const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text: `✉ رسالة جديدة من موقعك:\n\n${text}` })
    });
    const data = await res.json();
    if (data.ok) {
      status.textContent = '✓ تم الإرسال بنجاح 🌙';
      status.className = 'ok';
      msgInput.value = '';
      setTimeout(closeModal, 1800);
    } else {
      throw new Error(data.description || 'فشل الإرسال');
    }
  } catch(e) {
    status.textContent = `✗ خطأ: ${e.message}`;
    status.className = 'err';
  } finally {
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
