<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Space | Live Only</title>
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
    <style>
        :root { --bg: #0a0a0a; --green: #2ecc71; --white: #ffffff; --radius: 20px; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* خلفية PS3 المتموجة */
        .ps3-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: -1; }

        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; backdrop-filter: blur(15px); }
        .card { background: rgba(255,255,255,0.08); padding: 40px; border-radius: var(--radius); width: 300px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }

        #chat-screen { display: none; height: 100vh; flex-direction: column; }
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 12px 18px; border-radius: 22px; word-wrap: break-word; line-height: 1.4; animation: fadeIn 0.3s; }
        .msg.received { background: var(--green); color: black; align-self: flex-start; border-bottom-right-radius: 4px; }
        .msg.sent { background: var(--white); color: black; align-self: flex-end; border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; background: rgba(0,0,0,0.85); display: flex; gap: 10px; }
        #msg-input { flex: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="ps3-bg"></div>

<div id="login-screen">
    <div class="card">
        <h2 style="font-weight: 300;">Private Space</h2>
        <input type="password" id="password" placeholder="كلمة المرور">
        <button style="background: var(--white); width: 100%;" onclick="login()">دخول</button>
    </div>
</div>

<div id="chat-screen">
    <div id="messages-container"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="رسالة لحظية...">
        <button style="background: var(--green);" onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    // هذا المعرف مجاني للتجارب (سيقوم بنقل الرسائل فقط دون تخزين)
    const CLIENT_ID = 'yiS9PGois95U9W9X'; 
    const drone = new ScaleDrone(CLIENT_ID);
    const roomName = 'observable-secret-room';
    let room;

    function login() {
        if(document.getElementById('password').value === "123456") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            setupChat();
        } else { alert("خطأ!"); }
    }

    function setupChat() {
        drone.on('open', error => {
            if (error) return console.error(error);
            room = drone.subscribe(roomName);
            room.on('data', (data, member) => {
                const isMe = member.id === drone.clientId;
                displayMsg(data.text, isMe ? 'sent' : 'received');
            });
        });
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (text && room) {
            drone.publish({ room: roomName, message: { text: text } });
            input.value = '';
        }
    }

    function displayMsg(text, type) {
        const container = document.getElementById('messages-container');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
