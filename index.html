<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كتاباتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g:rgba(255,255,255,0.07);
      --gb:rgba(255,255,255,0.13);
      --gs:0 4px 20px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.04);
      --w:#f0efff;
      --d:rgba(255,255,255,0.5);
    }
    html,body{height:100%;font-family:'Tajawal',sans-serif;background:#000;color:var(--w);overflow-x:hidden}
    #cv{position:fixed;inset:0;z-index:0}
    #pg{position:fixed;inset:0;z-index:1;backdrop-filter:blur(2px) brightness(0.92);-webkit-backdrop-filter:blur(2px) brightness(0.92);pointer-events:none}
    #app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 2.5vw 100px;width:100%}
    header{width:100%;text-align:center;margin-bottom:28px;padding:20px 24px;background:var(--g);border:1px solid var(--gb);border-radius:16px;backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);box-shadow:var(--gs)}
    header h1{font-family:'Amiri',serif;font-size:clamp(1.4rem,2.5vw,2.2rem);font-weight:700;letter-spacing:2px;color:#fff;text-shadow:0 0 30px rgba(160,140,255,0.55),0 0 60px rgba(100,80,200,0.25)}
    header p{margin-top:4px;font-size:0.78rem;color:var(--d);font-weight:300;letter-spacing:2px}
    #wl{width:100%;display:flex;flex-direction:column;gap:14px}
    .wc{width:100%;background:var(--g);border:1px solid var(--gb);border-radius:14px;backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);box-shadow:var(--gs),inset 0 1px 0 rgba(255,255,255,0.08);padding:18px 24px;transition:transform .3s,box-shadow .3s,border-color .3s;animation:ci .55s ease both;cursor:default}
    .wc:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.24);box-shadow:0 12px 36px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.08),0 0 24px rgba(130,100,255,0.12)}
    .wc p{font-family:'Amiri',serif;font-size:0.98rem;line-height:1.95;color:rgba(255,255,255,0.86);white-space:pre-wrap;word-break:break-word}
    .wc .n{font-size:0.62rem;color:rgba(255,255,255,0.2);margin-bottom:7px;letter-spacing:3px;font-family:'Tajawal',sans-serif}
    @keyframes ci{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .wc:nth-child(1){animation-delay:.04s}.wc:nth-child(2){animation-delay:.1s}.wc:nth-child(3){animation-delay:.16s}.wc:nth-child(4){animation-delay:.22s}.wc:nth-child(5){animation-delay:.28s}.wc:nth-child(6){animation-delay:.34s}.wc:nth-child(7){animation-delay:.4s}.wc:nth-child(8){animation-delay:.46s}
    #es{text-align:center;color:var(--d);font-size:.9rem;padding:60px 20px;display:none}
    #es.show{display:block}
    #bb{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;align-items:center;background:rgba(10,8,20,0.6);border:1px solid var(--gb);border-radius:24px;padding:8px 16px;backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);box-shadow:0 6px 30px rgba(0,0,0,0.65)}
    .sb{display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--g);border:1px solid var(--gb);border-radius:12px;padding:7px 18px;min-width:64px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .sb .v{font-size:1.1rem;font-weight:700;color:#fff;line-height:1}
    .sb .l{font-size:0.6rem;color:var(--d);letter-spacing:1px}
    #mb{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.2);border-radius:14px;color:#fff;font-family:'Tajawal',sans-serif;font-size:0.85rem;font-weight:500;padding:9px 38px;cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:background .25s,transform .2s,box-shadow .25s;letter-spacing:1px}
    #mb:hover{background:rgba(255,255,255,0.16);transform:scale(1.04);box-shadow:0 0 22px rgba(160,130,255,0.3)}
    #mo{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(14px) brightness(0.55);-webkit-backdrop-filter:blur(14px) brightness(0.55);background:rgba(0,0,0,0.45)}
    #mo.open{display:flex}
    #mx{background:rgba(14,11,28,0.75);border:1px solid rgba(255,255,255,0.17);border-radius:22px;padding:30px 28px;width:min(92vw,480px);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);box-shadow:0 20px 56px rgba(0,0,0,0.85),inset 0 1px 0 rgba(255,255,255,0.1);animation:pi .32s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes pi{from{opacity:0;transform:scale(0.86) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
    #mx h2{font-family:'Amiri',serif;font-size:1.35rem;text-align:center;margin-bottom:18px;color:#fff;text-shadow:0 0 18px rgba(160,140,255,0.38)}
    #mi{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:12px;color:#fff;font-family:'Tajawal',sans-serif;font-size:0.95rem;padding:13px 15px;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:border-color .25s,box-shadow .25s;direction:rtl}
    #mi::placeholder{color:rgba(255,255,255,0.26)}
    #mi:focus{border-color:rgba(200,180,255,0.42);box-shadow:0 0 0 3px rgba(160,130,255,0.12)}
    #ma{display:flex;gap:10px;margin-top:15px}
    .btn{flex:1;padding:11px;border-radius:11px;border:1px solid rgba(255,255,255,0.13);font-family:'Tajawal',sans-serif;font-size:0.9rem;cursor:pointer;transition:all .25s}
    #snb{background:rgba(255,255,255,0.11);color:#fff}
    #snb:hover:not(:disabled){background:rgba(255,255,255,0.2);box-shadow:0 0 16px rgba(160,130,255,0.22)}
    #snb:disabled{opacity:.4;cursor:not-allowed}
    #cnb{background:transparent;color:rgba(255,255,255,0.48)}
    #cnb:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.78)}
    #ss{text-align:center;font-size:.82rem;margin-top:10px;min-height:18px}
    #ss.ok{color:#8effa0}#ss.err{color:#ffaeae}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.13);border-radius:10px}
  </style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="pg"></div>
<div id="app">
  <header>
    <h1>✦ كتاباتي ✦</h1>
    <p>أفكار، خواطر، كلمات</p>
  </header>
  <div id="wl"></div>
  <div id="es">
    <p>لم أضف كتابات بعد 🌙</p>
    <p style="font-size:.78rem;margin-top:6px;color:rgba(255,255,255,0.28)">أضف ملف mytxt.txt وضع كل كتابة في سطر</p>
  </div>
</div>
<div id="bb">
  <div class="sb"><span class="v" id="cw">0</span><span class="l">كتابة</span></div>
  <button id="mb">✉ راسلني</button>
</div>
<div id="mo">
  <div id="mx">
    <h2>أرسل لي رسالة 🌙</h2>
    <textarea id="mi" placeholder="اكتب ما تريد قوله..."></textarea>
    <div id="ma">
      <button class="btn" id="cnb">إلغاء</button>
      <button class="btn" id="snb">إرسال ✦</button>
    </div>
    <div id="ss"></div>
  </div>
</div>
<script>
(function(){
  const c=document.getElementById('cv'),x=c.getContext('2d');
  let W,H,S=[],M=[],N=[],Mo=[];
  const r=(a,b)=>a+Math.random()*(b-a);
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  function init(){
    S=[];M=[];N=[];Mo=[];
    for(let i=0;i<340;i++)S.push({x:r(0,W),y:r(0,H),r:r(0.3,2.2),a:r(0.3,1),ts:r(0.008,0.025),to:r(0,Math.PI*2),c:Math.random()<.15?`hsl(${r(220,280)},80%,85%)`:Math.random()<.1?`hsl(${r(30,60)},90%,85%)`:'#fff'});
    for(let i=0;i<5;i++)N.push({x:r(0,W),y:r(0,H),rx:r(W*.15,W*.35),ry:r(H*.12,H*.3),h:[240,260,280,300,200][i],a:r(0.04,0.11)});
    for(let i=0;i<2;i++)Mo.push({x:r(W*.1,W*.9),y:r(H*.05,H*.4),r:r(18,36)});
    for(let i=0;i<4;i++)M.push({x:r(0,W),y:r(-H*.3,H*.3),sp:r(6,14),a:r(0.5,1),tr:0});
  }
  let t=0;
  function draw(){
    x.clearRect(0,0,W,H);t+=.016;
    const bg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
    bg.addColorStop(0,'#0d0820');bg.addColorStop(.5,'#060412');bg.addColorStop(1,'#000005');
    x.fillStyle=bg;x.fillRect(0,0,W,H);
    N.forEach(n=>{
      x.save();x.translate(n.x,n.y);x.scale(n.rx/100,n.ry/100);
      const g=x.createRadialGradient(0,0,0,0,0,100);
      g.addColorStop(0,`hsla(${n.h},65%,38%,${n.a})`);g.addColorStop(.6,`hsla(${n.h+30},55%,25%,${n.a*.4})`);g.addColorStop(1,'transparent');
      x.fillStyle=g;x.beginPath();x.arc(0,0,100,0,Math.PI*2);x.fill();x.restore();
    });
    S.forEach(s=>{
      const a=s.a*(.6+.4*Math.sin(t*s.ts*60+s.to));
      x.save();x.globalAlpha=a;
      if(s.r>1.2){const sg=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);sg.addColorStop(0,s.c);sg.addColorStop(1,'transparent');x.fillStyle=sg;x.beginPath();x.arc(s.x,s.y,s.r*4,0,Math.PI*2);x.fill()}
      x.fillStyle=s.c;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fill();x.restore();
    });
    Mo.forEach(m=>{
      x.save();
      const gw=x.createRadialGradient(m.x,m.y,m.r*.5,m.x,m.y,m.r*3);
      gw.addColorStop(0,'rgba(220,210,255,0.18)');gw.addColorStop(1,'transparent');
      x.fillStyle=gw;x.beginPath();x.arc(m.x,m.y,m.r*3,0,Math.PI*2);x.fill();
      x.fillStyle='#dcd8f0';x.beginPath();x.arc(m.x,m.y,m.r,0,Math.PI*2);x.fill();
      x.fillStyle='rgba(0,0,20,0.85)';x.beginPath();x.arc(m.x+m.r*.3,m.y,m.r*.85,0,Math.PI*2);x.fill();
      [[.35,-.3,.12],[-.2,.4,.08],[.1,.2,.06]].forEach(([dx,dy,cr])=>{x.fillStyle='rgba(0,0,0,0.25)';x.beginPath();x.arc(m.x+dx*m.r,m.y+dy*m.r,cr*m.r,0,Math.PI*2);x.fill()});
      x.restore();
    });
    M.forEach((m,i)=>{
      m.tr+=m.sp;
      const an=Math.PI/5,ex=m.x+Math.cos(an)*m.tr,ey=m.y+Math.sin(an)*m.tr;
      const g=x.createLinearGradient(m.x,m.y,ex,ey);
      g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(.6,`rgba(200,190,255,${m.a*.6})`);g.addColorStop(1,`rgba(255,255,255,${m.a})`);
      x.save();x.strokeStyle=g;x.lineWidth=1.5;x.beginPath();x.moveTo(m.x,m.y);x.lineTo(ex,ey);x.stroke();x.restore();
      if(ex>W+100||ey>H+100)M[i]={x:r(-W*.2,W*.8),y:r(-H*.4,0),sp:r(6,14),a:r(0.5,1),tr:0};
    });
    requestAnimationFrame(draw);
  }
  resize();init();draw();
  addEventListener('resize',()=>{resize();init()});
})();

const TK='8091722508:AAHvpZW0YcZGozWG39OMUQ3KBSClDPOcf_Y';
const CI='8224700684';
async function tg(txt){
  const r=await fetch(`https://api.telegram.org/bot${TK}/sendMessage`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:CI,text:txt,parse_mode:'HTML'})
  });
  return r.json();
}

(async function(){
  if(sessionStorage.getItem('v'))return;
  sessionStorage.setItem('v','1');
  const now=new Date();
  const lt=now.toLocaleString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'—';
  const uo=-(now.getTimezoneOffset()/60);
  const ua=navigator.userAgent;
  const dev=/Tablet|iPad/i.test(ua)?'📟 تابلت':/Mobi|Android/i.test(ua)?'📱 جوال':'🖥️ كمبيوتر';
  const os=/Windows NT 10/i.test(ua)?'Windows 10/11':/Windows NT 6\.3/i.test(ua)?'Windows 8.1':/Windows NT 6\.1/i.test(ua)?'Windows 7':/Windows/i.test(ua)?'Windows':/iPhone/i.test(ua)?'iPhone iOS':/iPad/i.test(ua)?'iPad iOS':/Android/i.test(ua)?'Android '+((ua.match(/Android ([\d.]+)/)||[])[1]||''):/Mac OS X/i.test(ua)?'macOS':/Linux/i.test(ua)?'Linux':'—';
  const br=/Edg\//i.test(ua)?'Edge':/OPR\//i.test(ua)?'Opera':/Chrome\//i.test(ua)?'Chrome':/Firefox\//i.test(ua)?'Firefox':/Safari\//i.test(ua)?'Safari':'—';
  const bv=(ua.match(/(Chrome|Firefox|Safari|Edg|OPR)[\/]([\d.]+)/i)||[])[2]||'—';
  const ln=(navigator.languages||[navigator.language||'—']).slice(0,3).join(' / ');
  const cn=navigator.connection||{};
  const net=cn.effectiveType||cn.type||'—';
  const dl=cn.downlink?cn.downlink+' Mbps':'—';
  const rtt=cn.rtt?cn.rtt+' ms':'—';
  const mem=navigator.deviceMemory?navigator.deviceMemory+' GB':'—';
  const cpu=navigator.hardwareConcurrency?navigator.hardwareConcurrency+' نواة':'—';
  const scr=screen.width+'×'+screen.height;
  const win=innerWidth+'×'+innerHeight;
  const dpr=devicePixelRatio||1;
  const dep=screen.colorDepth||'—';
  const ref=document.referrer||'مباشر';
  let ip='—',city='—',reg='—',ctr='—',post='—',isp='—',tzs='—',lat='—',lon='—',asn='—';
  try{
    const d=await(await fetch('https://ipapi.co/json/')).json();
    ip=d.ip||'—';city=d.city||'—';reg=d.region||'—';
    ctr=(d.country_name||'—')+' '+(d.country||'');
    post=d.postal||'—';isp=d.org||'—';tzs=d.timezone||'—';
    lat=d.latitude||'—';lon=d.longitude||'—';asn=d.asn||'—';
  }catch(e){}
  tg(`🌌 <b>زائر جديد على موقعك!</b>
━━━━━━━━━━━━━━━━━━━━━━━

🕐 <b>الوقت والتاريخ:</b>
   ${lt}
   📍 المنطقة الزمنية: ${tz}
   🌐 UTC${uo>=0?'+':''}${uo} | توقيت الخادم: ${tzs}

━━━━━━━━━━━━━━━━━━━━━━━
📱 <b>الجهاز والنظام:</b>
   ${dev} — ${os}
   💻 المنصة: ${navigator.platform||'—'}
   🧠 RAM: ${mem} | المعالج: ${cpu}
   ${'ontouchstart' in window?'يدعم اللمس':'لا يدعم اللمس'}

🌐 <b>المتصفح:</b>
   ${br} v${bv}
   🍪 الكوكيز: ${navigator.cookieEnabled?'مفعّل':'معطّل'}
   🗣 اللغة: ${ln}

📐 <b>الشاشة:</b>
   دقة الشاشة: ${scr}
   حجم النافذة: ${win}
   معدل البكسل: ${dpr}x | عمق اللون: ${dep}-bit

━━━━━━━━━━━━━━━━━━━━━━━
📡 <b>الاتصال:</b>
   النوع: ${net} | السرعة: ${dl} | زمن الاستجابة: ${rtt}

━━━━━━━━━━━━━━━━━━━━━━━
🌍 <b>الموقع الجغرافي:</b>
   🌐 IP: <code>${ip}</code>
   🏙 المدينة: ${city}
   🏛 المنطقة: ${reg}
   🌍 الدولة: ${ctr}
   📮 الرمز البريدي: ${post}
   📡 مزود الإنترنت: ${isp}
   🏢 رقم AS: ${asn}
   📍 الإحداثيات: ${lat}, ${lon}

━━━━━━━━━━━━━━━━━━━━━━━
🔗 <b>مصدر الزيارة:</b> ${ref}
📄 <b>الصفحة:</b> ${location.href}`).catch(()=>{});
})();

(async function(){
  let lines=[];
  try{
    const res=await fetch('mytxt.txt?t='+Date.now());
    if(res.ok){const t=await res.text();lines=t.split('\n').map(l=>l.trim()).filter(Boolean)}
  }catch(e){}
  if(!lines.length)lines=["أضف ملف mytxt.txt في نفس مجلد الموقع، وضع كل كتابة في سطر جديد.","هذا نص تجريبي — الليل أكثر صدقًا من النهار.\nوالصمت أحيانًا يقول ما تعجز عنه الكلمات.","بعض الأشياء لا تُكتب لتُقرأ، بل لتُحسَّ."];
  const list=document.getElementById('wl');
  list.innerHTML='';
  lines.forEach((txt,i)=>{
    const d=document.createElement('div');
    d.className='wc';
    d.innerHTML=`<div class="n">✦ ${String(i+1).padStart(2,'0')}</div><p>${txt.replace(/\n/g,'<br>')}</p>`;
    list.appendChild(d);
  });
  document.getElementById('cw').textContent=lines.length;
})();

const mo=document.getElementById('mo');
document.getElementById('mb').onclick=()=>{mo.classList.add('open');document.getElementById('mi').focus();document.getElementById('ss').textContent='';document.getElementById('ss').className=''};
document.getElementById('cnb').onclick=close2;
mo.onclick=e=>{if(e.target===mo)close2()};
function close2(){mo.classList.remove('open');document.getElementById('mi').value='';document.getElementById('ss').textContent='';document.getElementById('ss').className=''}
document.getElementById('snb').onclick=async function(){
  const txt=document.getElementById('mi').value.trim();
  if(!txt)return;
  const btn=document.getElementById('snb'),st=document.getElementById('ss');
  btn.disabled=true;st.textContent='⏳ جاري الإرسال...';st.className='';
  try{
    const d=await tg(`✉️ <b>رسالة جديدة من موقعك:</b>\n\n${txt}`);
    if(d.ok){st.textContent='✓ تم الإرسال بنجاح 🌙';st.className='ok';document.getElementById('mi').value='';setTimeout(close2,1800)}
    else throw new Error(d.description||'فشل');
  }catch(e){st.textContent=`✗ ${e.message}`;st.className='err'}
  finally{btn.disabled=false}
};
</script>
</body>
</html>
