<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Space | Live</title>
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #2ecc71;
            --glass: rgba(255, 255, 255, 0.08);
            --radius: 20px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: white; overflow: hidden;
        }

        /* خلفية متموجة بسيطة */
        .wave-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* واجهة الدخول */
        #login-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; backdrop-filter: blur(15px);
        }

        .card {
            background: var(--glass); padding: 40px; border-radius: var(--radius);
            width: 300px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; padding: 14px; margin: 12px 0; border: none;
            border-radius: 15px; background: rgba(255,255,255,0.1);
            color: white; outline: none; box-sizing: border-box; text-align: center;
        }

        button {
            width: 100%; padding: 12px; border-radius: 15px; border: none;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            background: white; color: black;
        }

        button:active { transform: scale(0.98); }

        /* واجهة المحادثة */
        #chat-screen { display: none; height: 100vh; flex-direction: column; }

        #messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .msg {
            max-width: 75%; padding: 12px 18px; border-radius: 20px;
            font-size: 15px; line-height: 1.4; animation: slideIn 0.2s ease;
        }

        .sent { background: white; color: black; align-self: flex-end; border-bottom-left-radius: 2px; }
        .rcvd { background: var(--accent); color: black; align-self: flex-start; border-bottom-right-radius: 2px; }

        .input-area {
            padding: 20px; background: rgba(0,0,0,0.8);
            display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05);
        }

        #msg-input { flex: 1; margin: 0; text-align: right; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="wave-bg"></div>

<div id="login-screen">
    <div class="card">
        <h2 style="font-weight: 300; margin-bottom: 20px;">Private Space</h2>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="enterChat()">دخول</button>
    </div>
</div>

<div id="chat-screen">
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="اكتب رسالة سرية..." onkeypress="if(event.key==='Enter') send()">
        <button style="width: auto; background: var(--accent);" onclick="send()">إرسال</button>
    </div>
</div>

<script>
    // معرف قناة مؤقتة للتجارب (لا يخزن شيئاً)
    const CLIENT_ID = 'yiS9PGois95U9W9X'; 
    const drone = new ScaleDrone(CLIENT_ID);
    const roomName = 'observable-private-room-1'; // يمكنك تغيير الاسم ليكون غرفتك الخاصة
    let room;

    function enterChat() {
        if(document.getElementById('pass').value === "123456") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            drone.on('open', error => {
                if (error) return alert("فشل الاتصال");
                room = drone.subscribe(roomName);
                room.on('data', (data, member) => {
                    if (member.id !== drone.clientId) {
                        addMsg(data, 'rcvd');
                    }
                });
            });
        } else { alert("كلمة المرور خاطئة"); }
    }

    function send() {
        const input = document.getElementById('msg-input');
        if (input.value.trim() && room) {
            drone.publish({ room: roomName, message: input.value });
            addMsg(input.value, 'sent');
            input.value = '';
        }
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
