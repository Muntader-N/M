<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Space | Live</title>
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
    <style>
        :root { --bg: #0a0a0a; --accent: #2ecc71; --glass: rgba(255, 255, 255, 0.08); --radius: 20px; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        .wave-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: -1; }
        
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; backdrop-filter: blur(15px); }
        .card { background: var(--glass); padding: 30px; border-radius: var(--radius); width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; background: white; color: black; margin-top: 10px; }

        #chat-screen { display: none; height: 100vh; flex-direction: column; }
        #status-bar { font-size: 11px; padding: 5px; text-align: center; background: rgba(0,0,0,0.5); color: #888; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 15px; animation: slideIn 0.2s ease; position: relative; }
        .name-label { font-size: 10px; margin-bottom: 4px; opacity: 0.7; display: block; }
        
        .sent { background: white; color: black; align-self: flex-end; border-bottom-left-radius: 2px; }
        .rcvd { background: var(--accent); color: black; align-self: flex-start; border-bottom-right-radius: 2px; }

        .input-area { padding: 20px; background: rgba(0,0,0,0.85); display: flex; gap: 10px; }
        #msg-input { flex: 1; margin: 0; text-align: right; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="wave-bg"></div>

<div id="login-screen">
    <div class="card">
        <h2 style="font-weight: 300;">دخول الغرفة</h2>
        <input type="text" id="user-name" placeholder="اسمك المستعار">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="enterChat()">ابدأ المحادثة</button>
    </div>
</div>

<div id="chat-screen">
    <div id="status-bar">جاري الاتصال بالقناة...</div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') send()">
        <button style="width: auto; background: var(--accent); padding: 0 20px;" id="send-btn" onclick="send()">إرسال</button>
    </div>
</div>

<script>
    const CLIENT_ID = 'yiS9PGois95U9W9X'; 
    let drone, room, myName;

    function enterChat() {
        myName = document.getElementById('user-name').value.trim();
        const pass = document.getElementById('pass').value;

        if(!myName) return alert("الرجاء كتابة اسمك");
        if(pass !== "123456") return alert("كلمة المرور خاطئة");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';

        initDrone();
    }

    function initDrone() {
        drone = new ScaleDrone(CLIENT_ID);
        
        drone.on('open', error => {
            if (error) {
                document.getElementById('status-bar').innerText = "فشل الاتصال!";
                return console.error(error);
            }
            document.getElementById('status-bar').innerText = "متصل بالهواء - المحادثة سرية ومؤقتة";
            
            room = drone.subscribe('observable-room-mntzer');
            
            room.on('data', (data, member) => {
                if (member.id !== drone.clientId) {
                    addMsg(data.text, 'rcvd', data.user);
                }
            });
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        if (input.value.trim() && room) {
            const text = input.value;
            drone.publish({
                room: 'observable-room-mntzer',
                message: { text: text, user: myName }
            });
            addMsg(text, 'sent', 'أنا');
            input.value = '';
        } else if (!room) {
            alert("انتظر قليلاً حتى يكتمل الاتصال...");
        }
    }

    function addMsg(text, type, sender) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<span class="name-label">${sender}</span>${text}`;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
