<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Space | M_</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --accent-green: #2ecc71;
            --accent-white: #ffffff;
            --radius: 20px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-color); color: white; overflow: hidden;
        }

        /* خلفية متموجة نمط PS3 */
        .ps3-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        #status-toast {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); padding: 8px 20px;
            border-radius: 12px; display: none; z-index: 1000;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px; color: var(--accent-green); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; backdrop-filter: blur(15px); }
        .card { background: var(--glass-bg); padding: 40px; border-radius: var(--radius); width: 310px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: var(--radius); background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box; font-size: 1rem; }
        button { padding: 12px 25px; border-radius: var(--radius); border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        #chat-screen { display: none; height: 100vh; flex-direction: column; }
        #messages-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg { max-width: 75%; padding: 12px 18px; border-radius: 22px; animation: fadeIn 0.3s; word-wrap: break-word; line-height: 1.5; font-size: 0.95rem; }
        .msg.fixed { background: var(--accent-green); color: black; align-self: flex-start; border-bottom-right-radius: 4px; }
        .msg.temp { background: var(--accent-white); color: black; align-self: flex-end; border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; background: rgba(0,0,0,0.85); display: flex; gap: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        #msg-input { flex: 1; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="ps3-bg"></div>
<div id="status-toast"></div>

<div id="login-screen">
    <div class="card">
        <h2 style="font-weight: 300; margin-bottom: 25px; letter-spacing: 1px;">Private Space</h2>
        <input type="text" id="username" placeholder="الاسم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button style="background: var(--accent-white); width:100%; color: black;" onclick="login()">دخول</button>
    </div>
</div>

<div id="chat-screen">
    <div id="messages-container"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        <button style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);" onclick="sendMessage(false)">مؤقتة</button>
        <button style="background: var(--accent-green); color: black;" onclick="sendMessage(true)">ثابتة</button>
    </div>
</div>

<script>
    // --- الإعدادات المحدثة ---
    const GITHUB_TOKEN = "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"; 
    const REPO_OWNER = "Mntzer"; 
    const REPO_NAME = "M_"; // تم التعديل إلى M_
    const FILE_PATH = "dat.json"; 
    const SECRET_PASS = "123456"; 

    let tempMessages = [];

    function showStatus(m) {
        const t = document.getElementById('status-toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display='none', 3000);
    }

    function login() {
        if(document.getElementById('password').value === SECRET_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
            setInterval(loadMessages, 8000); 
        } else { alert("كلمة المرور خاطئة"); }
    }

    async function loadMessages() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        try {
            const res = await fetch(url, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });

            if(res.status === 200) {
                const data = await res.json();
                // دعم اللغة العربية في فك التشفير
                const decoded = decodeURIComponent(escape(atob(data.content)));
                const content = JSON.parse(decoded);
                renderUI(content.messages || []);
            } else {
                renderUI([]); 
            }
        } catch (e) { console.error("Load Error"); }
    }

    function renderUI(fixed) {
        const container = document.getElementById('messages-container');
        const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 60;
        
        container.innerHTML = '';
        fixed.forEach(m => displayMsg(m.text, 'fixed'));
        tempMessages.forEach(m => displayMsg(m, 'temp'));
        
        if (isAtBottom) container.scrollTop = container.scrollHeight;
    }

    function displayMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        document.getElementById('messages-container').appendChild(div);
    }

    async function sendMessage(isFixed) {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        if(isFixed) {
            showStatus("جاري المزامنة مع المستودع...");
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
                let messages = [];
                let sha = "";

                // جلب النسخة الأحدث
                const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                if(res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                    messages = JSON.parse(decodeURIComponent(escape(atob(data.content)))).messages || [];
                }

                messages.push({ text: text, time: new Date().toLocaleTimeString() });
                
                // التشفير مع دعم العربية
                const jsonStr = JSON.stringify({ messages: messages });
                const encodedContent = btoa(unescape(encodeURIComponent(jsonStr)));

                const updateRes = await fetch(url, {
                    method: 'PUT',
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "chat update",
                        content: encodedContent,
                        sha: sha !== "" ? sha : undefined
                    })
                });

                if(updateRes.ok) showStatus("تم الحفظ في M_ ✅");
                else showStatus("خطأ في صلاحيات التوكن");

            } catch(e) { showStatus("فشل الاتصال بـ GitHub"); }
        } else {
            tempMessages.push(text);
        }
        input.value = '';
        loadMessages();
    }
</script>
</body>
</html>
