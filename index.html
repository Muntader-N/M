<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Space | Debug Mode</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --accent-green: #2ecc71;
            --accent-white: #ffffff;
            --radius: 20px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-color); color: white; overflow: hidden;
        }

        /* خلفية PS3 */
        .ps3-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* رسائل الخطأ الجانبية */
        #error-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(255, 0, 0, 0.8); color: white;
            padding: 10px 20px; border-radius: 10px;
            display: none; z-index: 9999; font-size: 13px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }

        #login-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; backdrop-filter: blur(15px);
        }

        .card {
            background: var(--glass-bg); padding: 40px; border-radius: var(--radius);
            width: 300px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: var(--radius);
            background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box;
        }

        button {
            padding: 12px 25px; border-radius: var(--radius); border: none; cursor: pointer; font-weight: bold;
        }

        .btn-login { background: var(--accent-white); color: black; width: 100%; }

        #chat-screen { display: none; height: 100vh; flex-direction: column; }

        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .msg { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 15px; animation: fadeIn 0.3s; }
        .msg.fixed { background: var(--accent-green); color: black; align-self: flex-start; border-bottom-right-radius: 5px; }
        .msg.temp { background: var(--accent-white); color: black; align-self: flex-end; border-bottom-left-radius: 5px; }

        .input-area { padding: 20px; background: rgba(0,0,0,0.8); display: flex; gap: 10px; }
        #msg-input { flex: 1; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="ps3-bg"></div>
<div id="error-toast"></div>

<div id="login-screen">
    <div class="card">
        <h2>Private Space</h2>
        <input type="text" id="username" placeholder="الاسم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn-login" onclick="login()">دخول</button>
    </div>
</div>

<div id="chat-screen">
    <div id="messages-container"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="اكتب شيئاً...">
        <button style="background: var(--accent-white);" onclick="sendMessage(false)">مؤقتة</button>
        <button style="background: var(--accent-green);" onclick="sendMessage(true)">ثابتة</button>
    </div>
</div>

<script>
    const GIST_ID = "94af949e92ebb55eccd3aab33efd266f";
    const FILE_NAME = "user_languages.json";
    const GITHUB_TOKEN = "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";
    const SECRET_PASS = "123456";

    let tempMessages = [];

    function showError(msg) {
        const toast = document.getElementById('error-toast');
        toast.innerText = "⚠️ " + msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 5000);
    }

    function login() {
        const passInput = document.getElementById('password').value;
        if(passInput === SECRET_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
            setInterval(loadMessages, 7000); 
        } else {
            showError("كلمة المرور خاطئة!");
        }
    }

    async function loadMessages() {
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });

            if (response.status === 401) { showError("التوكن غير صالح (Unauthorized)"); return; }
            if (response.status === 404) { showError("المستودع (Gist) غير موجود"); return; }

            const data = await response.json();
            const file = data.files[FILE_NAME];
            
            if (!file) {
                showError(`الملف ${FILE_NAME} غير موجود داخل الـ Gist`);
                return;
            }

            let content = { messages: [] };
            try {
                content = file.content ? JSON.parse(file.content) : { messages: [] };
            } catch(e) {
                showError("خطأ في بنية JSON داخل الملف");
            }

            renderUI(content.messages);

        } catch (e) {
            showError("فشل الاتصال بالإنترنت أو بـ GitHub");
        }
    }

    function renderUI(fixedMsgs) {
        const container = document.getElementById('messages-container');
        container.innerHTML = '';
        if(fixedMsgs) fixedMsgs.forEach(m => displayMsg(m.text, 'fixed'));
        tempMessages.forEach(m => displayMsg(m, 'temp'));
        container.scrollTop = container.scrollHeight;
    }

    function displayMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        document.getElementById('messages-container').appendChild(div);
    }

    async function sendMessage(isFixed) {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        if(isFixed) {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });
                const gistData = await res.json();
                let content = JSON.parse(gistData.files[FILE_NAME].content || '{"messages":[]}');
                
                if(!content.messages) content.messages = [];
                content.messages.push({ text: text });

                const update = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` },
                    body: JSON.stringify({
                        files: { [FILE_NAME]: { content: JSON.stringify(content) } }
                    })
                });
                
                if(!update.ok) showError("فشل تحديث البيانات في GitHub");
            } catch(e) { showError("خطأ أثناء الإرسال الثابت"); }
        } else {
            tempMessages.push(text);
        }
        input.value = '';
        loadMessages();
    }
</script>
</body>
</html>
