<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كتاباتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      --white: #f0efff;
      --dim: rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: #000;
      color: var(--white);
      overflow-x: hidden;
    }

    #galaxy-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #page-glass {
      position: fixed;
      inset: 0;
      z-index: 1;
      backdrop-filter: blur(2px) brightness(0.92);
      -webkit-backdrop-filter: blur(2px) brightness(0.92);
      pointer-events: none;
    }

    /* ═══ MAIN LAYOUT — عريض وفسيح ═══ */
    #app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 60px 140px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ═══ HEADER ═══ */
    header {
      width: 100%;
      text-align: center;
      margin-bottom: 60px;
      padding: 44px 40px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      box-shadow: var(--glass-shadow);
    }

    header h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 40px rgba(160,140,255,0.6), 0 0 80px rgba(100,80,200,0.3);
    }

    header p {
      margin-top: 10px;
      font-size: 1.05rem;
      color: var(--dim);
      font-weight: 300;
      letter-spacing: 2px;
    }

    /* ═══ WRITINGS LIST ═══ */
    #writings-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .writing-card {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 26px;
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 38px 48px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      animation: cardIn 0.6s ease both;
      cursor: default;
    }

    .writing-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 20px 56px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1), 0 0 40px rgba(130,100,255,0.15);
    }

    .writing-card p {
      font-family: 'Amiri', serif;
      font-size: 1.35rem;
      line-height: 2.3;
      color: rgba(255,255,255,0.88);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .writing-card .card-num {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
      margin-bottom: 14px;
      letter-spacing: 3px;
      font-family: 'Tajawal', sans-serif;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .writing-card:nth-child(1)  { animation-delay: 0.05s; }
    .writing-card:nth-child(2)  { animation-delay: 0.12s; }
    .writing-card:nth-child(3)  { animation-delay: 0.19s; }
    .writing-card:nth-child(4)  { animation-delay: 0.26s; }
    .writing-card:nth-child(5)  { animation-delay: 0.33s; }
    .writing-card:nth-child(6)  { animation-delay: 0.40s; }
    .writing-card:nth-child(7)  { animation-delay: 0.47s; }
    .writing-card:nth-child(8)  { animation-delay: 0.54s; }

    #empty-state {
      text-align: center;
      color: var(--dim);
      font-size: 1.1rem;
      padding: 80px 20px;
      display: none;
    }
    #empty-state.show { display: block; }

    /* ═══ BOTTOM BAR — زر راسلني + عدد الكتابات فقط ═══ */
    #bottom-bar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 16px;
      align-items: center;
      background: rgba(10,8,20,0.55);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 14px 24px;
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 12px 28px;
      min-width: 90px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .stat-box .val {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .stat-box .lbl {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* زر راسلني — يمتد ليملأ المساحة */
    #msg-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 22px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      padding: 14px 52px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s, padding 0.2s;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    #msg-btn:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.04);
      box-shadow: 0 0 28px rgba(160,130,255,0.35);
    }

    /* ═══ MESSAGE MODAL ═══ */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(14px) brightness(0.6);
      -webkit-backdrop-filter: blur(14px) brightness(0.6);
      background: rgba(0,0,0,0.4);
    }

    #modal-overlay.open { display: flex; }

    #modal-box {
      background: rgba(15,12,30,0.72);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 32px;
      padding: 44px 40px;
      width: min(90vw, 540px);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      box-shadow: 0 24px 64px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.12);
      animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { opacity:0; transform: scale(0.85) translateY(20px); }
      to   { opacity:1; transform: scale(1)    translateY(0); }
    }

    #modal-box h2 {
      font-family: 'Amiri', serif;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 26px;
      color: #fff;
      text-shadow: 0 0 20px rgba(160,140,255,0.4);
    }

    #msg-input {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      padding: 18px 20px;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 0.25s, box-shadow 0.25s;
      direction: rtl;
    }

    #msg-input::placeholder { color: rgba(255,255,255,0.3); }

    #msg-input:focus {
      border-color: rgba(200,180,255,0.45);
      box-shadow: 0 0 0 3px rgba(160,130,255,0.15);
    }

    #modal-actions {
      display: flex;
      gap: 14px;
      margin-top: 22px;
    }

    .modal-btn {
      flex: 1;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    #send-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    #send-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 18px rgba(160,130,255,0.25);
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #cancel-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
    }

    #cancel-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }

    #send-status {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 14px;
      min-height: 20px;
    }

    #send-status.ok  { color: #8effa0; }
    #send-status.err { color: #ffaeae; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

    @media (max-width: 700px) {
      #app { padding: 30px 18px 120px; }
      .writing-card { padding: 26px 22px; }
      .writing-card p { font-size: 1.1rem; }
      #msg-btn { padding: 14px 30px; }
    }
  </style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>
<div id="page-glass"></div>

<div id="app">
  <header>
    <h1>✦ كتاباتي ✦</h1>
    <p>أفكار، خواطر، كلمات</p>
  </header>

  <div id="writings-list"></div>
  <div id="empty-state">
    <p>لم أضف كتابات بعد 🌙</p>
    <p style="font-size:0.85rem;margin-top:8px;color:rgba(255,255,255,0.3);">أضف ملف mytxt.txt في نفس المجلد وضع كل كتابة في سطر</p>
  </div>
</div>

<!-- Bottom Bar: عدد الكتابات + زر راسلني فقط -->
<div id="bottom-bar">
  <div class="stat-box">
    <span class="val" id="count-writings">0</span>
    <span class="lbl">كتابة</span>
  </div>
  <button id="msg-btn">✉ راسلني</button>
</div>

<!-- Message Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>أرسل لي رسالة 🌙</h2>
    <textarea id="msg-input" placeholder="اكتب ما تريد قوله..."></textarea>
    <div id="modal-actions">
      <button class="modal-btn" id="cancel-btn">إلغاء</button>
      <button class="modal-btn" id="send-btn">إرسال ✦</button>
    </div>
    <div id="send-status"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   GALAXY CANVAS
════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const stars = [], meteors = [], nebulas = [], moons = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function rand(a,b) { return a + Math.random()*(b-a); }

  function initObjects() {
    stars.length=0; meteors.length=0; nebulas.length=0; moons.length=0;
    for (let i=0;i<340;i++) stars.push({ x:rand(0,W), y:rand(0,H), r:rand(0.3,2.2), alpha:rand(0.3,1), twinkleSpeed:rand(0.008,0.025), twinkleOffset:rand(0,Math.PI*2), color:Math.random()<0.15?`hsl(${rand(220,280)},80%,85%)`:Math.random()<0.1?`hsl(${rand(30,60)},90%,85%)`:'#ffffff' });
    for (let i=0;i<5;i++) nebulas.push({ x:rand(0,W), y:rand(0,H), rx:rand(W*0.15,W*0.35), ry:rand(H*0.12,H*0.3), hue:[240,260,280,300,200][i], alpha:rand(0.04,0.11) });
    for (let i=0;i<2;i++) moons.push({ x:rand(W*0.1,W*0.9), y:rand(H*0.05,H*0.4), r:rand(18,36) });
    for (let i=0;i<4;i++) spawnMeteor();
  }

  function spawnMeteor() { meteors.push({ x:rand(0,W), y:rand(-H*0.3,H*0.3), speed:rand(6,14), alpha:rand(0.5,1), active:true, trail:0 }); }

  function drawNebulas() {
    nebulas.forEach(n => {
      ctx.save(); ctx.translate(n.x,n.y); ctx.scale(n.rx/100,n.ry/100);
      const g=ctx.createRadialGradient(0,0,0,0,0,100);
      g.addColorStop(0,`hsla(${n.hue},65%,38%,${n.alpha})`);
      g.addColorStop(0.6,`hsla(${n.hue+30},55%,25%,${n.alpha*0.4})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,100,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
  }

  function drawMoon(m) {
    ctx.save();
    const glow=ctx.createRadialGradient(m.x,m.y,m.r*0.5,m.x,m.y,m.r*3);
    glow.addColorStop(0,'rgba(220,210,255,0.18)'); glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(m.x,m.y,m.r*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#dcd8f0'; ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,20,0.85)'; ctx.beginPath(); ctx.arc(m.x+m.r*0.3,m.y,m.r*0.85,0,Math.PI*2); ctx.fill();
    [[0.35,-0.3,0.12],[-0.2,0.4,0.08],[0.1,0.2,0.06]].forEach(([dx,dy,cr])=>{ ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.arc(m.x+dx*m.r,m.y+dy*m.r,cr*m.r,0,Math.PI*2); ctx.fill(); });
    ctx.restore();
  }

  let t=0;
  function draw() {
    ctx.clearRect(0,0,W,H); t+=0.016;
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
    bg.addColorStop(0,'#0d0820'); bg.addColorStop(0.5,'#060412'); bg.addColorStop(1,'#000005');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    drawNebulas();
    stars.forEach(s=>{
      const a=s.alpha*(0.6+0.4*Math.sin(t*s.twinkleSpeed*60+s.twinkleOffset));
      ctx.save(); ctx.globalAlpha=a;
      if(s.r>1.2){ const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4); sg.addColorStop(0,s.color); sg.addColorStop(1,'transparent'); ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2); ctx.fill(); }
      ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    moons.forEach(drawMoon);
    meteors.forEach((m,i)=>{
      if(!m.active) return;
      m.trail+=m.speed;
      const angle=Math.PI/5, ex=m.x+Math.cos(angle)*m.trail, ey=m.y+Math.sin(angle)*m.trail;
      const grad=ctx.createLinearGradient(m.x,m.y,ex,ey);
      grad.addColorStop(0,'rgba(255,255,255,0)'); grad.addColorStop(0.6,`rgba(200,190,255,${m.alpha*0.6})`); grad.addColorStop(1,`rgba(255,255,255,${m.alpha})`);
      ctx.save(); ctx.strokeStyle=grad; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(ex,ey); ctx.stroke(); ctx.restore();
      if(ex>W+100||ey>H+100) meteors[i]={ x:rand(-W*0.2,W*0.8), y:rand(-H*0.4,0), speed:rand(6,14), alpha:rand(0.5,1), active:true, trail:0 };
    });
    requestAnimationFrame(draw);
  }

  resize(); initObjects(); draw();
  window.addEventListener('resize',()=>{ resize(); initObjects(); });
})();

/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const BOT_TOKEN = '8091722508:AAHvpZW0YcZGozWG39OMUQ3KBSClDPOcf_Y';
const CHAT_ID   = '8224700684';

async function sendTelegram(text) {
  const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'HTML' })
  });
  return await res.json();
}

/* ════════════════════════════════════════
   VISITOR NOTIFICATION
   يرسل إشعار تيليجرام عند كل زيارة جديدة
════════════════════════════════════════ */
(function notifyVisitor() {
  // نستخدم sessionStorage حتى لا يُرسل أكثر من مرة بنفس الجلسة
  if (sessionStorage.getItem('notified')) return;
  sessionStorage.setItem('notified', '1');

  const now = new Date();
  const timeStr = now.toLocaleString('ar-SA', { dateStyle:'full', timeStyle:'short' });
  const ua = navigator.userAgent;
  const device = /Mobi|Android/i.test(ua) ? '📱 جوال' : '🖥 كمبيوتر';

  sendTelegram(
    `🌌 <b>زائر جديد على موقعك!</b>\n\n` +
    `⏰ <b>الوقت:</b> ${timeStr}\n` +
    `${device}\n` +
    `🌐 <b>المتصفح:</b> ${ua.slice(0,80)}`
  ).catch(()=>{/* صامت */});
})();

/* ════════════════════════════════════════
   WRITINGS LOADER
════════════════════════════════════════ */
const DEMO_WRITINGS = [
  "أضف ملف mytxt.txt في نفس مجلد الموقع، وضع كل كتابة في سطر جديد.",
  "هذا نص تجريبي — الليل أكثر صدقًا من النهار.\nوالصمت أحيانًا يقول ما تعجز عنه الكلمات.",
  "بعض الأشياء لا تُكتب لتُقرأ، بل لتُحسَّ."
];

async function loadWritings() {
  let lines = [];
  try {
    const res = await fetch('mytxt.txt?v=' + Date.now());
    if (res.ok) {
      const text = await res.text();
      lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    }
  } catch(e) {}

  if (!lines.length) lines = DEMO_WRITINGS;

  const list = document.getElementById('writings-list');
  list.innerHTML = '';

  if (!lines.length) {
    document.getElementById('empty-state').classList.add('show');
    document.getElementById('count-writings').textContent = '0';
    return;
  }

  lines.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'writing-card';
    card.innerHTML = `<div class="card-num">✦ ${String(i+1).padStart(2,'0')}</div><p>${text.replace(/\n/g,'<br>')}</p>`;
    list.appendChild(card);
  });

  document.getElementById('count-writings').textContent = lines.length;
}

loadWritings();

/* ════════════════════════════════════════
   MESSAGE MODAL
════════════════════════════════════════ */
const overlay   = document.getElementById('modal-overlay');
const msgBtn    = document.getElementById('msg-btn');
const cancelBtn = document.getElementById('cancel-btn');
const sendBtn   = document.getElementById('send-btn');
const msgInput  = document.getElementById('msg-input');
const status    = document.getElementById('send-status');

msgBtn.addEventListener('click', () => {
  overlay.classList.add('open');
  msgInput.focus();
  status.textContent = ''; status.className = '';
});

cancelBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

function closeModal() {
  overlay.classList.remove('open');
  msgInput.value = '';
  status.textContent = ''; status.className = '';
}

sendBtn.addEventListener('click', async () => {
  const text = msgInput.value.trim();
  if (!text) return;

  sendBtn.disabled = true;
  status.textContent = '⏳ جاري الإرسال...';
  status.className = '';

  try {
    const data = await sendTelegram(`✉️ <b>رسالة جديدة من موقعك:</b>\n\n${text}`);
    if (data.ok) {
      status.textContent = '✓ تم الإرسال بنجاح 🌙';
      status.className = 'ok';
      msgInput.value = '';
      setTimeout(closeModal, 1800);
    } else {
      throw new Error(data.description || 'فشل الإرسال');
    }
  } catch(e) {
    status.textContent = `✗ خطأ: ${e.message}`;
    status.className = 'err';
  } finally {
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
